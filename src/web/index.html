<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#132226">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="/static/style.css?v={{ static_asset_version }}">
</head>
<body data-app-title="{{ app_title }}">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-eyebrow">Local Workspace</div>
                <h1>{{ app_title }}</h1>
                <p>Fresh chat app plus file viewer.</p>
            </div>

            <section class="sidebar-panel">
                <div class="sidebar-panel-label">Workspace</div>
                <div class="workspace-controls">
                    <select id="workspaceSelect" aria-label="Workspace"></select>
                    <button id="refreshWorkspaceButton" type="button">Refresh Files</button>
                </div>
            </section>

            <section class="sidebar-panel">
                <div class="sidebar-panel-header">
                    <span>Chats</span>
                    <button id="newChatButton" type="button">New Chat</button>
                </div>
                <div id="conversationList" class="conversation-list"></div>
            </section>

            <section class="sidebar-panel">
                <div class="sidebar-panel-header">
                    <span>Replay Report</span>
                    <button id="refreshContextEvalButton" type="button">Refresh Report</button>
                </div>
                <div id="contextEvalReport" class="context-eval-report"></div>
            </section>
        </aside>

        <main class="main-grid">
            <section class="panel chat-panel">
                <header class="panel-header">
                    <div>
                        <div class="panel-eyebrow">Chat</div>
                        <h2 id="chatTitle">New chat</h2>
                    </div>
                    <div class="status-stack">
                        <span id="connectionBadge" class="status-badge offline">Offline</span>
                        <span id="modelBadge" class="status-note">Checking model…</span>
                    </div>
                </header>

                <div id="chatMessages" class="chat-messages" aria-live="polite"></div>

                <form id="composerForm" class="composer" autocomplete="off">
                    <label class="composer-label" for="composerInput">Message</label>
                    <textarea
                        id="composerInput"
                        rows="4"
                        placeholder="Ask about the project, request a change, or inspect a file in the workspace."
                    ></textarea>
                    <div class="composer-actions">
                        <span id="composerHint" class="composer-hint">Enter sends. Shift+Enter adds a line break.</span>
                        <button id="sendButton" type="submit">Send</button>
                    </div>
                </form>
            </section>

            <section class="panel viewer-panel">
                <header class="panel-header viewer-header">
                    <div>
                        <div class="panel-eyebrow">Files</div>
                        <h2 id="viewerTitle">Workspace viewer</h2>
                    </div>
                    <button id="upDirectoryButton" type="button">Up One Level</button>
                </header>

                <div class="viewer-layout">
                    <div class="file-browser">
                        <div id="directoryPath" class="directory-path">/</div>
                        <div id="fileList" class="file-list"></div>
                    </div>
                    <div id="filePreview" class="file-preview">
                        <div class="empty-state">
                            <div class="empty-state-title">Open a file</div>
                            <p>Select a file from the workspace to preview it here.</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="/static/app.js?v={{ static_asset_version }}"></script>
</body>
</html>
