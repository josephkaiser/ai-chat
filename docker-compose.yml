version: '3.8'

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8001:8000"  # vLLM on port 8001
    volumes:
      - vllm_cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
    command: >
      --model meta-llama/Llama-3.2-3B-Instruct
      --served-model-name meta-llama/Llama-3.2-3B-Instruct
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.90
      --max-model-len 4096
      --dtype auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  chat-app:
    build: .
    container_name: ai-chat-vllm
    ports:
      - "8000:8000"  # Chat app on port 8000
    volumes:
      - ./data:/app/data
    environment:
      - VLLM_HOST=http://vllm:8000/v1
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  vllm_cache:
    driver: local
