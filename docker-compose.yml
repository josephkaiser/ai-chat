version: '3.8'

services:
  # Single vLLM instance - model can be switched dynamically
  vllm:
    image: vllm/vllm-openai:v0.5.4
    container_name: vllm
    ports:
      - "8001:8000"
    command: >
      --model Qwen/Qwen2.5-Coder-3B-Instruct
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.90
      --max-model-len 4096
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  chat-app:
    build: .
    container_name: ai-chat-vllm
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for model switching
    environment:
      - VLLM_HOST=http://vllm:8000/v1
      - VLLM_CONTAINER=vllm
    depends_on:
      - vllm
    restart: unless-stopped
