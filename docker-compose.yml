services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8001:8000"
    command: >
      --model Qwen/Qwen3-8B
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.90
      --max-model-len 32768
      --swap-space 8
      --enable-prefix-caching
      --max-num-seqs 256
      --enable-chunked-prefill
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  chat-app:
    build: .
    container_name: ai-chat-vllm
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - VLLM_HOST=http://vllm:8000/v1
      - MODEL_NAME=Qwen/Qwen3-8B
    depends_on:
      - vllm
    restart: unless-stopped
