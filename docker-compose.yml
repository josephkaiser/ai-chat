services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports:
      - "8001:8000"
    command: >
      --model ${VLLM_SELECTED_MODEL_NAME}
      --host 0.0.0.0
      --port 8000
      ${VLLM_SELECTED_MODEL_ARGS}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  chat-app:
    build: .
    container_name: ai-chat-vllm
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
      - ~/.cache/huggingface:/cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - VLLM_HOST=http://vllm:8000/v1
      - MODEL_NAME=${VLLM_SELECTED_MODEL_NAME}
      - MODEL_14B_NAME=${MODEL_14B_NAME}
      - MODEL_14B_ARGS=${MODEL_14B_ARGS}
      - DEFAULT_MODEL_PROFILE=${DEFAULT_MODEL_PROFILE}
      - HF_CACHE_PATH=/cache/huggingface
      - DOCKER_CONTROL_ENABLED=true
      - INTERACTIVE_TERMINAL_ENABLED=false
      - EXECUTE_CODE_ENABLED=false
      - STRICT_WORKSPACE_COMMAND_PATHS=true
    depends_on:
      - vllm
    restart: unless-stopped
