<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Menu button with status dot -->
    <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        &#9776;
        <span class="status-dot loading" id="statusDot"></span>
    </button>

    <!-- Menu overlay -->
    <div class="overlay" id="menuOverlay" onclick="closeMenu()">
        <div class="menu-panel" onclick="event.stopPropagation()">
            <div class="panel-header">
                <span>AI Chat</span>
                <button onclick="closeMenu()">&times;</button>
            </div>
            <div class="menu-actions">
                <button onclick="newChat(); closeMenu()">+ New Chat</button>
                <button onclick="closeMenu(); showDashboard()">Dashboard</button>
                <button onclick="closeMenu(); showSettings()">Settings</button>
            </div>
            <div class="menu-search">
                <input type="text" id="searchInput" placeholder="Search chats..." oninput="handleSearch(this.value)">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="menu-chats" id="conversations"></div>
        </div>
    </div>

    <!-- Dashboard overlay -->
    <div class="overlay" id="dashboardOverlay" onclick="closeDashboard()">
        <div class="dashboard-panel" onclick="event.stopPropagation()">
            <div class="panel-header">
                <span>Dashboard</span>
                <button onclick="closeDashboard()">&times;</button>
            </div>
            <div class="dashboard-content" id="dashboardContent">
                <div style="text-align:center; padding:30px; color:var(--text_secondary)">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Settings overlay -->
    <div class="overlay" id="settingsOverlay" onclick="closeSettings()">
        <div class="settings-panel" onclick="event.stopPropagation()">
            <div class="panel-header">
                <span>Settings</span>
                <button onclick="closeSettings()">&times;</button>
            </div>
            <div class="settings-content">
                <button onclick="toggleTheme()">
                    <span class="settings-icon" id="themeIcon">&#127769;</span>
                    <span>Toggle Theme</span>
                </button>
                <button onclick="closeSettings(); openSystemPromptEditor()">
                    <span class="settings-icon">&#9881;</span>
                    <span>System Prompt</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main chat area -->
    <div class="chat welcome-layout">
        <div class="messages" id="messages">
            <div class="welcome">
                <h1 style="font-weight:700; margin:0 0 0.25em;">{{ model_name }}</h1>
                <h2>Welcome</h2>
                <p>Start a conversation</p>
            </div>
        </div>
        <div class="input-area welcome-mode" id="inputArea">
            <div class="input-container" onclick="focusInput()">
                <textarea id="input" placeholder="Type your message..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResizeTextarea(this)"></textarea>
                <button id="send" onclick="sendMessage()">&#10148;</button>
            </div>
        </div>
    </div>

    <!-- Rename modal -->
    <div class="modal" id="renameModal">
        <div class="modal-content">
            <h3>Rename Conversation</h3>
            <input type="text" id="renameInput" placeholder="Enter new title..." onkeydown="if(event.key==='Enter'){event.preventDefault();confirmRename()}">
            <div class="modal-buttons">
                <button onclick="closeRenameModal()">Cancel</button>
                <button class="primary" onclick="confirmRename()">Rename</button>
            </div>
        </div>
    </div>

    <!-- System Prompt modal -->
    <div class="modal" id="systemPromptModal">
        <div class="modal-content" style="max-width:600px;">
            <h3>System Prompt</h3>
            <textarea id="systemPromptInput" placeholder="Enter system prompt... (leave empty for default)"></textarea>
            <div class="modal-buttons">
                <button onclick="resetSystemPrompt()">Reset</button>
                <button onclick="closeSystemPromptModal()">Cancel</button>
                <button class="primary" onclick="saveSystemPrompt()">Save</button>
            </div>
        </div>
    </div>

    <script>
        window.THEMES = {{ themes_json|safe }};
        window.MODEL_NAME = "{{ model_name }}";
    </script>
    <script src="/static/app.js"></script>
</body>
</html>
